<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ເຄື່ອງມືສ້າງ QR CODE</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- QR CODE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6">

        <!-- Header -->
        <div class="flex justify-between items-center mb-4">
            <a href="index.html"
               class="text-sm bg-gray-200 px-3 py-1 rounded-lg hover:bg-gray-300 transition">
               ← ກັບຄືນ
            </a>

            <h1 class="text-lg font-bold text-gray-800">
                ສ້າງ QR CODE
            </h1>

            <div id="timerDisplay"
                 class="text-xs text-red-500 font-mono bg-red-50 px-2 py-1 rounded border border-red-200">
                 10:00
            </div>
        </div>

        <p class="text-xs text-gray-500 mb-4">
            ຖ້າບໍ່ມີການເຄື່ອນໄຫວພາຍໃນ 10ນາທີ ລະບົບຈະປິດອັດຕາໂນມັດ
        </p>

        <!-- INPUT -->
        <textarea id="inputArea"
                  rows="6"
                  class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4 focus:border-blue-500 outline-none uppercase"
                  placeholder="ໃສ່ຂໍ້ມູນ..."
                  oninput="this.value = this.value.toUpperCase(); resetTimer();"></textarea>

        <!-- BUTTON -->
        <div class="flex gap-2">
            <button onclick="generateQRCodes()"
                    class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold active:scale-95 transition">
                    ສ້າງ QR CODE
            </button>

            <button id="downloadBtn"
                    onclick="confirmAndDownload()"
                    class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold active:scale-95 transition hidden">
                    ດາວໂຫຼດ .ZIP
            </button>
        </div>

        <!-- STATUS -->
        <div id="status"
             class="mt-4 text-sm text-center text-gray-600 font-bold uppercase italic">
        </div>

        <!-- QR CONTAINER -->
        <div id="qrContainer"
             class="mt-6 flex flex-col items-center gap-6">
        </div>

    </div>

<script>

    let currentQRCodes = [];
    let timeLeft = 600;

    // TIMER
    const timerInterval = setInterval(() => {

        timeLeft--;

        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;

        document.getElementById('timerDisplay').innerText =
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            window.close();
        }

    }, 1000);

    function resetTimer() {
        timeLeft = 600;
    }

    // GENERATE QR
    function generateQRCodes() {

        resetTimer();

        const container = document.getElementById('qrContainer');
        const status = document.getElementById('status');

        const lines = document.getElementById('inputArea')
            .value
            .split('\n')
            .filter(line => line.trim() !== '')
            .slice(0, 50);

        container.innerHTML = '';
        currentQRCodes = [];

        lines.forEach((text, index) => {

            // WRAPPER
            const wrapper = document.createElement('div');
            wrapper.className = "bg-white p-4 rounded-xl shadow flex flex-col items-center gap-2";

            // QR BOX
            const qrDiv = document.createElement('div');
            qrDiv.id = `qr-${index}`;

            wrapper.appendChild(qrDiv);

            // TEXT
            const label = document.createElement('div');
            label.className = "text-sm font-bold text-gray-700 break-all text-center";
            label.innerText = text;

            wrapper.appendChild(label);

            container.appendChild(wrapper);

            // CREATE QR
            new QRCode(qrDiv, {
                text: text,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            currentQRCodes.push({
                text,
                qrDiv
            });

        });

        if (currentQRCodes.length > 0) {

            document.getElementById('downloadBtn')
                .classList
                .remove('hidden');

            status.innerText =
                `ສ້າງ QR CODE ສຳເລັດ ${currentQRCodes.length} ລາຍການ`;
        }
    }

    // CONFIRM
    function confirmAndDownload() {

        if (confirm("ຕ້ອງການດາວໂຫຼດ QR CODE ທັງໝົດ (.ZIP) ທີ່ມີຊື່ກຳກັບ ຫຼືບໍ່?")) {
            downloadAll();
        }
    }

    // DOWNLOAD ZIP WITH TEXT LABELS
    async function downloadAll() {

        resetTimer();

        document.getElementById('status').innerText =
            "ກຳລັງກະກຽມໄຟລ໌...";

        const zip = new JSZip();

        for (let i = 0; i < currentQRCodes.length; i++) {

            const item = currentQRCodes[i];
            const img = item.qrDiv.querySelector('img');

            if (img) {
                // 1. ສ້າງ Canvas ຂຶ້ນມາເພື່ອແຕ້ມຮູບ QR ແລະ ຂໍ້ຄວາມໃສ່ຮ່ວມກັນ
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const qrSize = 200; // ຂະໜາດ QR Code
                const padding = 20; // ໄລຍະຫ່າງຂອບ
                const textSpace = 50; // ພື້ນທີ່ສຳລັບຂຽນຊື່/ຂໍ້ຄວາມ
                
                canvas.width = qrSize + (padding * 2); // ຄວາມກວ້າງທັງໝົດ 240px
                canvas.height = qrSize + padding + textSpace; // ຄວາມສູງທັງໝົດ 270px

                // 2. ຖົມພື້ນຫຼັງດ້ວຍສີຂາວ
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 3. ແຕ້ມຮູບ QR Code ໃສ່ Canvas
                await new Promise((resolve) => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        ctx.drawImage(tempImg, padding, padding, qrSize, qrSize);
                        resolve();
                    };
                    tempImg.src = img.src;
                });

                // 4. ຂຽນຂໍ້ຄວາມ/ຊື່ ໃສ່ກ້ອງ QR Code
                ctx.fillStyle = '#374151'; // ໃຊ້ສີເທົາເຂັ້ມ (gray-700)
                ctx.font = 'bold 14px sans-serif'; // ກຳນົດ Font ແລະ ຂະໜາດ
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                
                const labelText = item.text;
                const maxTextWidth = qrSize; // ກຳນົດບໍ່ໃຫ້ຂໍ້ຄວາມກວ້າງກວ່າຮູບ QR
                const textY = qrSize + padding + 10; // ຕຳແໜ່ງແນວຕັ້ງຂອງຂໍ້ຄວາມ

                // ປັບຂະໜາດ Font ໃຫ້ໜ້ອຍລົງ ຖ້າຂໍ້ຄວາມຍາວເກີນໄປ
                if (ctx.measureText(labelText).width > maxTextWidth) {
                    ctx.font = 'bold 11px sans-serif';
                }
                
                ctx.fillText(labelText, canvas.width / 2, textY, maxTextWidth);

                // 5. ແປງ Canvas ໃຫ້ເປັນ Blob (ຮູບພາບ PNG)
                const blob = await new Promise((resolve) => {
                    canvas.toBlob((b) => resolve(b), 'image/png');
                });

                // 6. ຕັ້ງຊື່ໄຟລ໌ໂດຍເອົາຊື່ QR Code ມາໃສ່ນຳ (ຕັດຕົວອັກສອນພິເສດອອກເພື່ອບໍ່ໃຫ້ໄຟລ໌ມີບັນຫາ)
                const sanitizedText = labelText.replace(/[/\\?%*:|"<>]/g, '-').substring(0, 30);
                zip.file(`QR_${i + 1}_${sanitizedText}.png`, blob);
            }
        }

        // 7. ສ້າງໄຟລ໌ ZIP ແລະ ດາວໂຫຼດ
        const zipBlob = await zip.generateAsync({
            type: "blob"
        });

        saveAs(zipBlob, "QRCODES.zip");

        document.getElementById('status').innerText =
            "ດາວໂຫຼດສຳເລັດ";
    }

</script>

</body>
</html>
